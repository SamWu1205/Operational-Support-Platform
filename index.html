<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>勤務補給導航系統</title>
    <style>
        /* 💡 修正 1：鎖定網頁滑動，防止地圖操作時網頁亂跑 */
        html, body { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; /* 禁止網頁本身捲動 */
            overscroll-behavior: none; /* 禁止手機下拉更新效果 */
            position: fixed; /* 徹底鎖定背景 */
        }
        
        #map { height: 75vh; width: 100%; touch-action: none; }
        
        .panel { 
            height: 25vh; background: #2c3e50; color: white; padding: 15px; 
            box-sizing: border-box; z-index: 100; position: relative;
        }
        
        #alertBox { 
            background: #e67e22; padding: 10px; border-radius: 5px; 
            margin-bottom: 8px; display: none; font-weight: bold; 
        }

        .controls { display: flex; justify-content: space-between; align-items: flex-start; }
        .btn-upload { background: #3498db; color: white; padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; }
        .status-text { font-size: 0.8em; color: #bdc3c7; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="panel">
        <div id="alertBox">⚠️ 抵達補給點！</div>
        <div class="controls">
            <div>
                <strong>勤務控制台</strong><br>
                <span id="gpsStatus" class="status-text">GPS 初始化...</span><br>
                <span id="dbStatus" class="status-text">雲端狀態：待機</span>
            </div>
            <input type="file" id="kmlInput" accept=".kml" style="display:none;" />
            <button class="btn-upload" onclick="document.getElementById('kmlInput').click()">匯入 KML 點位</button>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAHLUkaGRW7j7ZHFaTEJMKNbkMzZm218w4&libraries=drawing,geometry"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 請務必確認以下欄位已正確填寫 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyAHLUkaGRW7j7ZHFaTEJMKNbkMzZm218w4",
            authDomain: "你的專案.firebaseapp.com",
            projectId: "你的專案ID",
            storageBucket: "你的專案ID.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let map, userMarker, supplyPoints = [];

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 25.033, lng: 121.565 },
                zoom: 17,
                mapTypeId: 'hybrid',
                tilt: 45,
                gestureHandling: "greedy" // 💡 讓地圖優先處理所有手勢
            });

            syncData();
            startGPS();
        }

        function syncData() {
            onSnapshot(collection(db, "supplies"), (snapshot) => {
                supplyPoints.forEach(p => p.marker.setMap(null));
                supplyPoints = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const marker = new google.maps.Marker({
                        position: data.position,
                        map: map,
                        title: data.name
                    });
                    supplyPoints.push({ ...data, marker });
                });
                document.getElementById("dbStatus").innerText = `雲端狀態：已同步 ${snapshot.size} 個點位`;
            });
        }

        function startGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((p) => {
                    const latLng = { lat: p.coords.latitude, lng: p.coords.longitude };
                    if (!userMarker) userMarker = new google.maps.Marker({ position: latLng, map: map, label: "您" });
                    else userMarker.setPosition(latLng);
                    
                    document.getElementById("gpsStatus").innerText = `GPS 定位正常 (誤差: ${p.coords.accuracy.toFixed(0)}m)`;
                    
                    // 偵測距離
                    let alertText = "";
                    supplyPoints.forEach(sp => {
                        const dist = google.maps.geometry.spherical.computeDistanceBetween(
                            new google.maps.LatLng(latLng.lat, latLng.lng),
                            new google.maps.LatLng(sp.position.lat, sp.position.lng)
                        );
                        if (dist < 50) alertText = `⚠️ 到達：${sp.name} (距離 ${dist.toFixed(0)}m)`;
                    });
                    const box = document.getElementById("alertBox");
                    if (alertText) { box.innerText = alertText; box.style.display = "block"; }
                    else { box.style.display = "none"; }

                }, null, { enableHighAccuracy: true });
            }
        }

        // 💡 修正 2：更強大的 KML 解析邏輯
        document.getElementById('kmlInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                const kml = new DOMParser().parseFromString(event.target.result, "text/xml");
                const placemarks = kml.querySelectorAll("Placemark");
                let count = 0;

                for (let pm of placemarks) {
                    const name = pm.querySelector("name")?.textContent || "未命名";
                    // 嘗試多種座標抓取方式
                    const coordNode = pm.getElementsByTagName("coordinates")[0];
                    if (coordNode) {
                        const raw = coordNode.textContent.trim().split(/\s+/)[0]; // 抓第一組座標
                        const [lng, lat] = raw.split(",").map(Number);
                        
                        if (!isNaN(lat) && !isNaN(lng)) {
                            await addDoc(collection(db, "supplies"), {
                                name,
                                position: { lat, lng },
                                createdAt: serverTimestamp()
                            });
                            count++;
                        }
                    }
                }
                alert(`匯入完成！成功新增 ${count} 筆點位。`);
            };
            reader.readAsText(file);
        });

        window.onload = initMap;
    </script>
</body>
</html>
